<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HabitFlow</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="script.js"></script>
</head>

<body class="h-full bg-gradient-to-br from-purple-50 to-indigo-100 flex items-center justify-center p-4">
  <div class="modal-box w-full max-w-md">
    <!-- Header with Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome to HabitFlow</h1>
      <p class="text-gray-600">Build better habits, track your progress</p>
    </div>

    <!-- Tab Toggle -->
    <div class="flex bg-gray-100 rounded-lg p-1 mb-6">
      <button id="login-tab" class="tab-btn active flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all" onclick="showLogin()">
        Login
      </button>
      <button id="signup-tab" class="tab-btn flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all" onclick="showSignup()">
        Sign Up
      </button>
    </div>

    <!-- Alert Container -->
    <div id="alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

    <!-- Login Form -->
    <div id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          id="loginEmail"
          placeholder="Enter your email"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-colors"
          required
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          type="password"
          id="loginPassword"
          placeholder="Enter your password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-colors"
          required
        >
      </div>

      <button
        onclick="handleLogin()"
        class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 px-4 rounded-lg font-medium hover:from-purple-700 hover:to-indigo-700 transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]"
      >
        <span id="login-btn-text">Sign In</span>
      </button>
    </div>

    <!-- Signup Form -->
    <div id="signupForm" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input
          type="text"
          id="signupName"
          placeholder="Enter your full name"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-colors"
          required
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          id="signupEmail"
          placeholder="Enter your email"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-colors"
          required
        >
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          type="password"
          id="signupPassword"
          placeholder="Create a password"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition-colors"
          required
        >
      </div>

      <button
        onclick="handleSignup()"
        class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 px-4 rounded-lg font-medium hover:from-purple-700 hover:to-indigo-700 transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]"
      >
        <span id="signup-btn-text">Create Account</span>
      </button>
    </div>

    <!-- Footer -->
    <div class="mt-6 text-center text-sm text-gray-600">
      <p>By signing up, you agree to our Terms of Service</p>
    </div>
  </div>

</body>
</html>
   
  </script>
</body>
</html>
